name: Validate

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: 
      - data
    paths:
      - "Samples/**"
  pull_request:
    branches: 
     - main 
     - data 
     - data-actions-tests
    types: [opened, synchronize, reopened]
    paths:
      - "Samples/**"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  Changes:
    runs-on: ubuntu-latest
    outputs:
      press_process:  '${{ steps.detect-changes.outputs.press_process }}'
      press_count: ${{ steps.detect-changes.outputs.press_count }}
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout PressMint
        uses: actions/checkout@v3
        with:
          path: PressMint
          fetch-depth: 2 # when called a pull_request - test is run on test merge -> full history is not needed to detect changes
      - name: Setup # initialize dependencies cache - used in next steps
        uses: ./PressMint/.github/actions/PressMintSetup
      - name: PressMint status (Detect changed files and get list of countries that should be processed)
        id: detect-changes
        uses: ./PressMint/.github/actions/PressMintStatus
      - name: Test total TEI file size limit
        if: ${{ steps.detect-changes.outputs.max_press_changed_size > 100 && github.event.pull_request.base.ref != 'main' }} 
        run: |
          echo "::error::100MB file limit has been exceed my one country folder"
          exit 1

  ValidateCountries:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    needs: Changes
    strategy:
      matrix:
        press: ${{ fromJSON(needs.Changes.outputs.press_process) }}
      fail-fast: false
    steps:
      - name: Checkout PressMint
        uses: actions/checkout@v3
        with:
          path: PressMint
      - name: Setup
        uses: ./PressMint/.github/actions/PressMintSetup
        with:
          press: ${{matrix.press}}
      - name: Validate PressMint-${{matrix.press}} (as it is without modifications)
        id: validate_src
        uses: ./PressMint/.github/actions/PressMintValidate
        # continue-on-error: true
        with:
          press: '${{matrix.press}}'
          requireTaxonomiesTranslations: '${{ vars.REQUIRE_TRANSLATIONS }}'
      - name: Validate PressMint-${{matrix.press}} with building script
        id: validate_build
        uses: ./PressMint/.github/actions/PressMintBuild
        # if: ${{ always() }}
        with:
          press: '${{matrix.press}}'

  Validate:
    runs-on: ubuntu-latest
    needs: [ValidateCountries, Changes]
    outputs:
      press_count: ${{ needs.Changes.outputs.press_count }}
      press_process: ${{ needs.Changes.outputs.press_process }}
    steps:
      - name: Find old metadata artifacts
        id: find
        uses: actions/github-script@v8
        with:
          script: |
            const pr = '${{ github.event.pull_request.number }}';
            
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
      
            const old = artifacts.data.artifacts.filter(a =>
              a.name === `pressmint-meta-pr-${pr}`
            );
      
            core.setOutput("ids", old.map(a => a.id).join(","));
      
      - name: Delete old metadata artifacts
        if: steps.find.outputs.ids != ''
        uses: actions/github-script@v8
        with:
          script: |
            const ids = '${{ steps.find.outputs.ids }}'.split(',');
      
            for (const id of ids) {
              if (!id) continue;
      
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: Number(id)
              });
            }
        env:
          GH_TOKEN: ${{ github.token }}      
      - name: Save metadata artifacts
        run: |
          echo "press_count=${{ needs.Changes.outputs.press_count }}" >> pressmint.env
          echo "press_process=${{ needs.Changes.outputs.press_process }}" >> pressmint.env
      - uses: actions/upload-artifact@v4
        with:
          name: pressmint-meta-pr-${{ github.event.pull_request.number }}
          path: pressmint.env
      - run: echo Done!

